{% extends "Dashboard/panel-admin.html" %}

{% block content %}

<h2>Reportes del Sistema</h2>

<div style="display:flex; gap:20px; margin-bottom:30px;">

<div style="background:#4CAF50; color:white; padding:20px; border-radius:10px; width:200px;">
<h3>Total Ordenes</h3>
<h1>{{ total }}</h1>
</div>

<div style="background:#f39c12; color:white; padding:20px; border-radius:10px; width:200px;">
<h3>Pendientes</h3>
<h1>{{ pendientes }}</h1>
</div>

<div style="background:#3498db; color:white; padding:20px; border-radius:10px; width:200px;">
<h3>En Ruta</h3>
<h1>{{ en_ruta }}</h1>
</div>

<div style="background:#2ecc71; color:white; padding:20px; border-radius:10px; width:200px;">
<h3>Entregadas</h3>
<h1>{{ entregadas }}</h1>
</div>

</div>

<h3>Estadísticas</h3>

<canvas id="graficaOrdenes"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const ctx = document.getElementById('graficaOrdenes');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Pendientes', 'En Ruta', 'Entregadas'],
        datasets: [{
            label: 'Ordenes',
            data: [{{ pendientes }}, {{ en_ruta }}, {{ entregadas }}],
            borderWidth: 1
        }]
    },
    options: {
        responsive: true
    }
});

</script>

{% endblock %}
