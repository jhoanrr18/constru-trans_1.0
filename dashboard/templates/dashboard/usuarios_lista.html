{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Lista de Usuarios</h2>

<table class="table table-striped">

    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>

    {% for usuario in usuarios %}

        <tr>
            <td>{{ usuario.id }}</td>
            <td>{{ usuario.nombre }}</td>
            <td>{{ usuario.telefono }}</td>
            <td>{{ usuario.rol }}</td>

            <td>

                <a href="{% url 'usuarios:editar_usuario' usuario.id %}" class="btn btn-primary btn-sm">
                    Editar
                </a>

                <a href="{% url 'usuarios:eliminar_usuario' usuario.id %}" class="btn btn-danger btn-sm">
                    Eliminar
                </a>

            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

{% endblock %}
