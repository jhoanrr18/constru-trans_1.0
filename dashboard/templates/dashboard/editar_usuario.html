{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">

            <h3 class="mb-4">✏️ Editar Usuario</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre</label>
                    <input 
                        type="text" 
                        name="nombre" 
                        value="{{ usuario.nombre }}" 
                        class="form-control rounded-3"
                        placeholder="Nombre completo"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Teléfono</label>
                    <input 
                        type="text" 
                        name="telefono" 
                        value="{{ usuario.telefono }}" 
                        class="form-control rounded-3"
                        placeholder="Ej: 3001234567"
                        required
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Rol</label>
                    <select name="rol" class="form-control rounded-3">
                        <option value="admin" {% if usuario.rol == "admin" %}selected{% endif %}>Admin</option>
                        <option value="cliente" {% if usuario.rol == "cliente" %}selected{% endif %}>Cliente</option>
                        <option value="conductor" {% if usuario.rol == "conductor" %}selected{% endif %}>Conductor</option>
                    </select>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{% url 'lista_usuarios' %}" class="btn btn-outline-secondary rounded-3">
                        ← Volver
                    </a>

                    <button type="submit" class="btn btn-success rounded-3 px-4">
                         Guardar cambios
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
