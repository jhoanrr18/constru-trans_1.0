{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="{% static 'css/registroestilo.css' %}">

<style>

body{
    font-family: Arial;
    background: linear-gradient(90deg,#1d5fa7,#f2a21b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#1d5fa7;
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#1d5fa7;
    color:white;
    border:none;
    border-radius:5px;
    margin-top:10px;
}

button:hover{
    background:#154a83;
}

.links{
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<img src="{% static 'img/Logo1.jpeg' %}" width="200" style="display:block;margin:auto;margin-bottom:10px;">

<h2>Crear Cuenta</h2>

{% if error %}
<p style="color:red;text-align:center">{{ error }}</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text" name="nombre" placeholder="Nombre completo" required>

<input type="email" name="correo" placeholder="Correo electrónico" required>

<input type="text" name="telefono" placeholder="Teléfono">

<select name="tipo_documento" required>
<option value="">Tipo de documento</option>
<option value="CC">Cédula de Ciudadanía</option>
<option value="CE">Cédula de Extranjería</option>
<option value="PA">Pasaporte</option>
<option value="PEP">Permiso Especial de Permanencia</option>
<option value="PPT">Permiso por Protección Temporal</option>
<option value="NIT">NIT</option>
</select>

<input type="text" name="documento" placeholder="Número de documento" required>

<select name="rol" required>
<option value="">Seleccionar tipo de usuario</option>
<option value="cliente">Cliente</option>
<option value="conductor">Conductor</option>
</select>

<input type="password" name="contrasena" placeholder="Contraseña" required>

<input type="password" name="confirmar_contrasena" placeholder="Confirmar contraseña" required>

<button type="submit">Registrarse</button>

</form>

<div class="links">
<p>¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a></p>
</div>

</div>

</body>
</html>
