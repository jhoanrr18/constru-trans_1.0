{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Recuperar contraseña</title>

<link rel="stylesheet" href="{% static 'css/loginestilo.css' %}">

<style>
body{
    font-family: Arial;
    background: linear-gradient(90deg,#1d5fa7,#f2a21b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#1d5fa7;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#1d5fa7;
    color:white;
    border:none;
    border-radius:5px;
    margin-top:10px;
}

button:hover{
    background:#154a83;
}

.links{
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

.links a{
    color:#1d5fa7;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="card">

<img src="{% static 'img/Logo1.jpeg' %}" width="200" style="display:block;margin:auto;margin-bottom:10px;">

<h2>Recuperar contraseña</h2>

<form method="POST">

{% csrf_token %}

<input type="email" name="email" placeholder="Ingresa tu correo" required>

<button type="submit">Enviar enlace</button>

</form>

<div class="links">

<p><a href="{% url 'login' %}">Volver al login</a></p>

</div>

</div>

</body>
</html>
