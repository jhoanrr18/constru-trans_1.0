{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="{% static 'img/Logo1.jpeg' %}" type="image/x-icon">

<title>{% block title %}Panel Administrador{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="{% static 'css/loader.css' %}">

</head>

<body>

<div id="loader-container">
    <img src="{% static 'img/Logo1.jpeg' %}" class="loader-img" alt="Cargando...">
    <div class="loader">
        <div class="progress-bar"></div>
    </div>
    <p>Cargando Constru-trans...</p>
</div>

<div class="container-fluid p-0">
<div class="d-flex">

{% include "partials/sidebar.html" %}

<main class="flex-grow-1 bg-light p-4 overflow-auto">

{% include "partials/navbar.html" %}

{% block content %}
{% endblock %}

</main>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'java/loader.js' %}"></script>

</body>
</html>
