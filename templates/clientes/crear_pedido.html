{% extends "Cliente/base_cliente.html" %}

{% block content %}

<div class="form-container-centered">

<div class="card card-form p-4">

<h2 class="text-center mb-4">Solicitar Servicio</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
    <label class="form-label">Material</label>
    <select name="material" class="form-select rounded-pill" required>
        <option value="">Seleccione un material</option>
        {% for m in materiales %}
            <option value="{{ m.id }}">
                {{ m.nombre }} - ${{ m.precio }}
            </option>
        {% endfor %}
    </select>
</div>

<div class="mb-3">
    <label class="form-label">Cantidad</label>
    <input type="number" name="cantidad" class="form-control rounded-pill" placeholder="Cantidad de material" required>
</div>

<div class="mb-3">
    <label class="form-label">Dirección de entrega</label>
    <input type="text" name="direccion" class="form-control rounded-pill" placeholder="Dirección exacta" required>
</div>

<div class="mb-3">
    <label class="form-label">Fecha y Hora Programada de Entrega</label>
    <input type="datetime-local" name="fecha_entrega" class="form-control rounded-pill" required>
</div>

{% if error %}
    <div class="alert alert-danger py-2 mb-3 small">
        <i class="bi bi-exclamation-triangle me-2"></i> {{ error }}
    </div>
{% endif %}

<div class="d-grid gap-2 mt-4">
    <button type="submit" class="btn btn-primary rounded-pill">
        <i class="bi bi-check-lg me-2"></i> Crear Pedido
    </button>
    <a href="{% url 'usuarios:panel_cliente' %}" class="btn btn-light rounded-pill">
        Volver
    </a>
</div>

</form>

</div>

</div>

{% endblock %}
