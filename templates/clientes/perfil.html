{% extends "Cliente/base_cliente.html" %}

{% block content %}

<h3 class="mb-4">Mi Perfil</h3>

<div class="row">

<!-- TARJETA PERFIL -->
<div class="col-md-6">

<div class="card shadow-sm mb-4">

<div class="card-body text-center">

<i class="bi bi-person-circle" style="font-size:80px;color:#1d5fa7;"></i>

<h4 class="mt-3">{{ cliente.nombre }}</h4>

<p class="text-muted">{{ request.user.email }}</p>

</div>

</div>

</div>

<!-- TARJETA INFORMACION -->
<div class="col-md-6">

<div class="card shadow-sm">

<div class="card-body">

<h5 class="mb-3">Información</h5>

<p><strong>Teléfono:</strong> {{ cliente.telefono }}</p>

<p><strong>Documento:</strong> {{ cliente.documento }}</p>

<p><strong>Tipo documento:</strong> {{ cliente.tipo_documento }}</p>

<p><strong>Estado:</strong> {{ cliente.estado }}</p>

</div>

</div>

</div>

</div>

{% endblock %}
