{% extends "clientes/base_cliente.html" %}

{% block content %}
<div class="form-container-centered">
    <div class="card card-form p-4">
        <h2 class="text-center mb-4">Editar Pedido #{{ orden.id }}</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Material</label>
                <select name="material" id="select-material" class="form-select rounded-pill" required onchange="calcularTotal()">
                    {% for m in materiales %}
                        <option value="{{ m.id }}" data-precio="{{ m.precio }}" {% if m.id == orden.material.id %}selected{% endif %}>
                            {{ m.nombre }} - ${{ m.precio }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Cantidad</label>
                <input type="number" name="cantidad" id="input-cantidad" value="{{ orden.cantidad }}" class="form-control rounded-pill" required oninput="calcularTotal()" min="1">
            </div>

            <div class="card bg-light border-0 rounded-4 mb-4">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <span class="fw-bold text-muted">Total Estimado:</span>
                    <h3 class="mb-0 fw-bold text-primary" id="display-total">$ {{ orden.precio }}</h3>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Dirección de entrega</label>
                <input type="text" name="direccion" value="{{ orden.direccion_destino }}" class="form-control rounded-pill" required>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary rounded-pill">
                    <i class="bi bi-save me-2"></i> Guardar Cambios
                </button>
                <a href="{% url 'usuarios:mis_pedidos' %}" class="btn btn-light rounded-pill">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function calcularTotal() {
    const select = document.getElementById('select-material');
    const cantidadInput = document.getElementById('input-cantidad');
    const display = document.getElementById('display-total');
    
    const precio = parseFloat(select.options[select.selectedIndex].getAttribute('data-precio')) || 0;
    let cantidad = parseInt(cantidadInput.value) || 0;
    
    if (cantidad < 0) {
        display.innerText = "Cantidad no válida";
        display.classList.remove('text-primary');
        display.classList.add('text-danger');
        return;
    } else {
        display.classList.remove('text-danger');
        display.classList.add('text-primary');
    }
    
    const total = precio * cantidad;
    display.innerText = '$ ' + total.toLocaleString();
}
</script>
{% endblock %}
