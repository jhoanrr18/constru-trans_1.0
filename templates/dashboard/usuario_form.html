{% extends "base.html" %}

{% block title %}Nuevo Usuario - Constru-trans{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="table-container p-4 p-md-5">
            <div class="text-center mb-5">
                <i class="bi bi-person-plus-fill text-accent fs-1 mb-3 d-block"></i>
                <h3 class="fw-800 text-white mb-2">Registrar Nuevo Usuario</h3>
                <p class="text-muted">Crea un nuevo perfil de administrador, conductor o cliente.</p>
            </div>

            {% if error %}
                <div class="alert alert-danger rounded-4 px-4 mb-4 border-0 shadow-sm" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" value="{{ form_data.nombre|default:'' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Correo Electrónico (Username)</label>
                        <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com" value="{{ form_data.email|default:'' }}" required>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Contraseña Temporal</label>
                        <input type="password" name="password" class="form-control" placeholder="Contraseña segura" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Teléfono de Contacto</label>
                        <input type="text" name="telefono" class="form-control" placeholder="3001234567" value="{{ form_data.telefono|default:'' }}" required>
                    </div>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-4">
                        <label class="form-label">Rol del Usuario</label>
                        <select name="rol" class="form-select" required>
                            <option value="">Seleccione rol...</option>
                            <option value="cliente" {% if form_data.rol == 'cliente' %}selected{% endif %}>Cliente</option>
                            <option value="conductor" {% if form_data.rol == 'conductor' %}selected{% endif %}>Conductor</option>
                            <option value="admin" {% if form_data.rol == 'admin' %}selected{% endif %}>Administrador</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tipo de Documento</label>
                        <select name="tipo_doc" class="form-select" required>
                            <option value="CC" {% if form_data.tipo_doc == 'CC' %}selected{% endif %}>Cédula Ciudadanía</option>
                            <option value="CE" {% if form_data.tipo_doc == 'CE' %}selected{% endif %}>Cédula Extranjería</option>
                            <option value="NIT" {% if form_data.tipo_doc == 'NIT' %}selected{% endif %}>NIT</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Número de Documento</label>
                        <input type="text" name="documento" class="form-control" placeholder="12345678" value="{{ form_data.documento|default:'' }}" required>
                    </div>
                </div>

                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-gold rounded-pill py-3 fw-800 shadow-sm">
                        <i class="bi bi-person-check me-2"></i> Registrar Usuario
                    </button>
                    <a href="{% url 'usuarios:lista_usuarios' %}" class="btn btn-outline-light rounded-pill py-2">
                        Cancelar y Volver
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .fw-800 { font-weight: 800; }
    .text-accent { color: var(--color-accent) !important; }
</style>

{% endblock %}
