{% extends "base.html" %}

{% block title %}Editar Material{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-body">

            <h4 class="mb-4">Editar Material</h4>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" 
                           value="{{ material.nombre }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3">{{ material.descripcion }}</textarea>
                </div>


                <div class="mb-3">
                    <label>Tipo</label>
                        <select name="tipo" class="form-select" required>
                                <option value="">Seleccione tipo</option>
                                <option value="cemento" {% if material.tipo == "cemento" %}selected{% endif %}>Cemento</option>
                                <option value="arena" {% if material.tipo == "arena" %}selected{% endif %}>Arena</option>
                                <option value="grava" {% if material.tipo == "grava" %}selected{% endif %}>Grava</option>
                                <option value="ladrillo" {% if material.tipo == "ladrillo" %}selected{% endif %}>Ladrillo</option>
                        </select>
                </div>



                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" name="precio" class="form-control" 
                               value="{{ material.precio }}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" name="stock" class="form-control" 
                               value="{{ material.stock }}" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="{% url 'usuarios:materiales_lista' %}" class="btn btn-secondary">
                        Volver
                    </a>

                    <button type="submit" class="btn btn-primary">
                        Actualizar Material
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
