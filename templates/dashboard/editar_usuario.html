{% extends "base.html" %}

{% block content %}

<div class="form-container-centered">
    <div class="card card-form p-4">
        <h2 class="text-center mb-4">Editar Usuario</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Nombres</label>
                    <input type="text" name="nombres" value="{{ usuario.nombres }}" class="form-control rounded-pill" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellidos</label>
                    <input type="text" name="apellidos" value="{{ usuario.apellidos }}" class="form-control rounded-pill" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" name="telefono" value="{{ usuario.telefono }}" class="form-control rounded-pill">
            </div>

            <div class="mb-3">
                <label class="form-label">Rol</label>
                {% if request.user.usuario.rol == 'admin' %}
                    <select name="rol" class="form-select rounded-pill">
                        <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
                        <option value="cliente" {% if usuario.rol == 'cliente' %}selected{% endif %}>Cliente</option>
                        <option value="conductor" {% if usuario.rol == 'conductor' %}selected{% endif %}>Conductor</option>
                    </select>
                {% else %}
                    <div class="p-2 bg-light border rounded-pill px-3">
                        <span class="badge bg-primary rounded-pill">{{ usuario.rol|title }}</span>
                        <input type="hidden" name="rol" value="{{ usuario.rol }}">
                    </div>
                {% endif %}
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-success rounded-pill">
                    <i class="bi bi-save me-2"></i> Guardar Cambios
                </button>
                <a href="{% url 'usuarios:lista_usuarios' %}" class="btn btn-light rounded-pill">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
