{% extends "base.html" %}

{% block title %}Nuevo Material - Constru-trans{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="table-container p-4 p-md-5">
            <div class="text-center mb-5">
                <i class="bi bi-box-seam text-accent fs-1 mb-3 d-block"></i>
                <h3 class="fw-800 text-white mb-2">Registrar Nuevo Material</h3>
                <p class="text-muted">Ingresa los detalles técnicos y de inventario del material.</p>
            </div>

            {% if error %}
                <div class="alert alert-danger rounded-4 px-4 mb-4 border-0 shadow-sm" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label">Nombre del Material</label>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej: Cemento Gris" value="{{ material.nombre|default:'' }}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Tipo de Material</label>
                    <select name="tipo" class="form-select" required>
                        <option value="">Seleccione tipo...</option>
                        <option value="Cemento" {% if material.tipo == 'Cemento' %}selected{% endif %}>Cemento</option>
                        <option value="Arena" {% if material.tipo == 'Arena' %}selected{% endif %}>Arena</option>
                        <option value="Grava" {% if material.tipo == 'Grava' %}selected{% endif %}>Grava</option>
                        <option value="Ladrillo" {% if material.tipo == 'Ladrillo' %}selected{% endif %}>Ladrillo</option>
                        <option value="Herramientas" {% if material.tipo == 'Herramientas' %}selected{% endif %}>Herramientas</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3" placeholder="Detalles adicionales del material...">{{ material.descripcion|default:'' }}</textarea>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-6">
                        <label class="form-label">Precio Unitario ($)</label>
                        <input type="number" name="precio" class="form-control" placeholder="0.00" value="{{ material.precio|default:'' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Stock Inicial</label>
                        <input type="number" name="stock" class="form-control" placeholder="0" value="{{ material.stock|default:'' }}" required>
                    </div>
                </div>

                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-gold rounded-pill py-3 fw-800 shadow-sm">
                        <i class="bi bi-check2-circle me-2"></i> Guardar Material
                    </button>
                    <a href="{% url 'usuarios:materiales_lista' %}" class="btn btn-outline-light rounded-pill py-2">
                        Cancelar y Volver
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .fw-800 { font-weight: 800; }
    .text-accent { color: var(--color-accent) !important; }
</style>

{% endblock %}
