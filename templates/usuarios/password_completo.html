{% extends "usuarios/panel-sesion.html" %}

{% block title %}Contraseña Cambiada - Constru-trans{% endblock %}

{% block content %}
<div class="text-center py-4 animate-up">
    <div class="illustration-container mx-auto mb-5 animate__animated animate__tada" style="width: 120px; height: 120px; background: rgba(34, 197, 94, 0.1); border: 2px solid #22c55e;">
        <i class="bi bi-check-circle-fill fs-1 text-success"></i>
    </div>
    
    <h1 class="welcome-title" style="color: #22c55e;">SUCCESS!</h1>
    
    <p class="text-muted mb-5 px-3">
        Your password has been updated successfully. You can now sign in with your new credentials.
    </p>

    <div class="d-grid animate-up delay-1">
        <a href="{% url 'usuarios:login' %}" class="btn btn-gold">
            Sign In Now <i class="bi bi-arrow-right ms-2"></i>
        </a>
    </div>
</div>
{% endblock %}
