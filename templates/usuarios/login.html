{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<link rel="shortcut icon" href="{% static 'img/Logo1.jpeg' %}" type="image/x-icon">
<title>Iniciar sesión</title>

<link rel="stylesheet" href="{% static 'css/loginestilos.css' %}">

</head>

<body>

<div class="card">

<img src="{% static 'img/Logo1.jpeg' %}" width="200" style="display:block;margin:auto;margin-bottom:10px;">

<h2>Iniciar sesión</h2>

{% if error %}
<p class="error">
{{ error }}
</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Usuario o Correo" required>

<input type="password" name="password" placeholder="Contraseña" required>

<button type="submit">Ingresar</button>

</form>

<div class="links">

<a href="{% url 'usuarios:password_reset' %}">
¿Olvidaste tu contraseña?
</a>

<p>
¿No tienes cuenta?  
<a href="{% url 'usuarios:registro' %}">Regístrate</a>
</p>

</div>

</div>

</body>
</html>
