{% extends "base.html" %}

{% block header_title %}Crear Nueva Entrega{% endblock %}

{% block content %}
<div class="table-container p-4">
    <h2 class="text-white mb-4">Formulario de Entrega</h2>
    <form method="POST" class="row g-3">
        {% csrf_token %}
        <div class="col-md-6 mb-3">
            <label class="form-label text-muted small fw-bold">Seleccionar Pedido</label>
            <select name="pedido" class="form-select rounded-pill border-0 px-4 bg-dark text-white" required>
                <option value="">Seleccionar pedido...</option>
                {% for p in pedidos %}
                    <option value="{{ p.id }}">Pedido #CT-{{ p.id }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label text-muted small fw-bold">Asignar Conductor</label>
            <select name="conductor" class="form-select rounded-pill border-0 px-4 bg-dark text-white" required>
                <option value="">Seleccionar conductor...</option>
                {% for c in conductores %}
                    <option value="{{ c.id }}">{{ c.nombres }} {{ c.apellidos }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label text-muted small fw-bold">Vehículo</label>
            <select name="vehiculo" class="form-select rounded-pill border-0 px-4 bg-dark text-white" required>
                <option value="">Seleccionar vehículo...</option>
                {% for v in vehiculos %}
                    <option value="{{ v.id }}">{{ v.placa }} - {{ v.tipo }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label text-muted small fw-bold">Fecha Programada</label>
            <input type="datetime-local" name="fecha" class="form-control rounded-pill border-0 px-4 bg-dark text-white" required>
        </div>

        <div class="col-12 mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-gold rounded-pill px-5 fw-bold">
                <i class="bi bi-save me-2"></i> Guardar Entrega
            </button>
            <a href="javascript:history.back()" class="btn btn-outline-light rounded-pill px-4">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
