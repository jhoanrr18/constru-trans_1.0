{% load gravatar %}
<header class="navbar-custom d-flex justify-content-between align-items-center mb-5 p-4 rounded-4 shadow-lg border-start border-primary border-4" style="background: var(--color-surface); border-left: 6px solid var(--color-primary) !important;">
    <div class="d-flex align-items-center">
        {% load static %}
        <img src="{% static 'img/Logo1.jpeg' %}" height="40" class="me-3 d-lg-none rounded-2" alt="Logo">
        <h2 class="h4 fw-800 m-0 text-white" style="font-family: 'Montserrat', sans-serif;">{% block header_title %}Panel de Control{% endblock %}</h2>
    </div>

    <div class="d-flex align-items-center gap-4">
        <div class="d-none d-md-block text-end">
            <p class="small text-white fw-700 mb-0">{{ user.get_full_name|default:user.username }}</p>
            <span class="badge-role">{{ user.usuario.rol|title }}</span>
        </div>
        {% if user.usuario.rol == 'admin' %}
            <a href="{% url 'usuarios:perfil_admin' %}" class="profile-link">
        {% elif user.usuario.rol == 'conductor' %}
            <a href="{% url 'usuarios:perfil_conductor' %}" class="profile-link">
        {% else %}
            <a href="{% url 'usuarios:perfil_cliente' %}" class="profile-link">
        {% endif %}
            <img src="{{ user.email|gravatar_url:45 }}" class="rounded-circle border-2 border-accent" alt="Perfil" width="45" height="45" style="border: 2px solid var(--color-accent) !important;">
        </a>
    </div>

    <style>
        .navbar-custom {
            border: 1px solid rgba(255,255,255,0.03);
        }
        .badge-role {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            color: var(--color-accent);
            background: rgba(202, 160, 48, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }
        .profile-link {
            transition: transform 0.3s ease;
        }
        .profile-link:hover {
            transform: scale(1.1);
        }
        .fw-800 { font-weight: 800; }
        .fw-700 { font-weight: 700; }
    </style>
</header>
