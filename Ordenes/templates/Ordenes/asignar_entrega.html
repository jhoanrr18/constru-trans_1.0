{% extends "base.html" %}

{% block content %}

<div class="container mt-4"><div class="card shadow-sm">

    <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Asignar Entrega</h5>
    </div>

    <div class="card-body">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Conductor</label>
                <select name="conductor" class="form-select">
                    {% for c in conductores %}
                    <option value="{{ c.id }}">{{ c.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Vehículo</label>
                <select name="vehiculo" class="form-select">
                    {% for v in vehiculos %}
                    <option value="{{ v.id }}">{{ v.placa }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
    <label>Fecha</label>
    <input type="date" name="fecha" class="form-control" required>
</div>

<div class="mb-3">
    <label>Hora</label>
    <input type="time" name="hora" class="form-control" required>
</div>

            <div class="d-flex justify-content-between">

                <a href="{% url 'lista_ordenes' %}" class="btn btn-secondary">
                    Cancelar
                </a>

                <button type="submit" class="btn btn-success">
                    Asignar Entrega
                </button>

            </div>

        </form>

    </div>

</div>

</div>{% endblock %}
